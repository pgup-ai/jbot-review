name: 'jbot-review'
description: 'Agentic PR review via opencode serve + SDK, with gated inline posting.'

branding:
  icon: 'git-pull-request'
  color: 'purple'

inputs:
  provider:
    description: 'LLM provider (defaults to opencode).'
    default: 'opencode'
  model:
    description: 'Model as provider/model. Uses provider default if unset.'
    required: false
    default: ''
  api-key:
    description: 'API key for the selected provider.'
    required: true
  github-token:
    description: 'Token to read the PR and post the review.'
    required: true
    default: ${{ github.token }}

runs:
  using: 'docker'
  image: 'docker://ghcr.io/pgup-ai/jbot-review:latest'
  entrypoint: 'node'
  args: ['/app/dist/workflow/index.js']
  env:
    INPUT_PROVIDER: ${{ inputs.provider }}
    INPUT_MODEL: ${{ inputs.model }}
    INPUT_API-KEY: ${{ inputs.api-key }}
    INPUT_GITHUB-TOKEN: ${{ inputs.github-token }}
