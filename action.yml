name: 'J-Bot Code Review'
description: 'Agentic PR review via opencode serve + SDK, with gated inline posting.'

branding:
  icon: 'git-pull-request'
  color: 'green'

inputs:
  provider:
    description: 'LLM provider. Defaults to opencode when unset.'
    required: false
    default: ''
  model:
    description: 'Provider model id, optionally prefixed as provider/model. Uses provider default if unset.'
    required: false
    default: ''
  opencode-api-key:
    description: 'OpenCode API key. Used when provider or aux-provider is opencode/opencode-go.'
    required: false
    default: ''
  deepseek-api-key:
    description: 'DeepSeek API key. Used when provider or aux-provider is deepseek.'
    required: false
    default: ''
  openai-api-key:
    description: 'OpenAI API key. Used when provider or aux-provider is openai.'
    required: false
    default: ''
  anthropic-api-key:
    description: 'Anthropic API key. Used when provider or aux-provider is anthropic.'
    required: false
    default: ''
  gemini-api-key:
    description: 'Gemini API key. Used when provider or aux-provider is google.'
    required: false
    default: ''
  openrouter-api-key:
    description: 'OpenRouter API key. Used when provider or aux-provider is openrouter.'
    required: false
    default: ''
  nvidia-api-key:
    description: 'NVIDIA API key. Used when provider or aux-provider is nvidia.'
    required: false
    default: ''
  zai-api-key:
    description: 'Z.AI API key. Used when provider or aux-provider is zai-coding-plan.'
    required: false
    default: ''
  xai-api-key:
    description: 'xAI API key. Used when provider or aux-provider is xai.'
    required: false
    default: ''
  fireworks-api-key:
    description: 'Fireworks AI API key. Used when provider or aux-provider is fireworks-ai.'
    required: false
    default: ''
  mimo-api-key:
    description: 'Xiaomi MiMo Token Plan API key (tp-… / sk-…). Used when provider or aux-provider is xiaomi-token-plan-sgp.'
    required: false
    default: ''
  devin-windsurf-api-key:
    description: 'Devin/Windsurf API key. Used when provider or active aux-provider is devin.'
    required: false
    default: ''
  commandcode-access-key:
    description: 'CommandCode CLI access key. Used when provider or active aux-provider is commandcode.'
    required: false
    default: ''
  cursor-api-key:
    description: 'Cursor API key. Used when provider or active aux-provider is cursor.'
    required: false
    default: ''
  codex-auth:
    description: 'Codex CLI auth: the contents of ~/.codex/auth.json. Used when provider or active aux-provider is codex.'
    required: false
    default: ''
  cline-auth:
    description: 'Cline CLI auth: the contents of ~/.cline/data/settings/providers.json. Used when provider or active aux-provider is cline or cline-pass.'
    required: false
    default: ''
  kilo-auth:
    description: 'Kilo CLI auth: the contents of ~/.local/share/kilo/auth.json. Used when provider or active aux-provider is kilo.'
    required: false
    default: ''
  enable-context7:
    description: 'Enable Context7 MCP documentation lookup for external API/SDK/framework/workflow changes. Use auto, true, or false.'
    required: false
    default: 'auto'
  context7-api-key:
    description: 'Optional Context7 API key for reliable MCP documentation lookup in CI.'
    required: false
    default: ''
  github-token:
    description: 'Token to read the PR and post the review.'
    required: true
    default: ${{ github.token }}
  thread-resolution-token:
    description: 'Optional token used only to resolve addressed review threads. Falls back to github-token when unset.'
    required: false
    default: ''
  pr-number:
    description: 'Pull request number for manual workflow_dispatch runs.'
    required: false
    default: ''
  dry-run:
    description: 'Log the review body and inline comments without posting to GitHub.'
    required: false
    default: 'false'
  max-findings:
    description: 'Maximum number of findings to post or log. Use 0 for no limit.'
    required: false
    default: '0'
  min-severity:
    description: 'Minimum severity to include: P0, P1, P2, P3, or nit.'
    required: false
    default: 'nit'
  include-prior-comments:
    description: 'Include prior PR review comments in the review context.'
    required: false
    default: 'true'
  enable-guideline-pass:
    description: 'Run a dedicated guideline-compliance review session when repository guidelines are discovered.'
    required: false
    default: 'true'
  aux-model:
    description: 'Model for auxiliary sessions (addressed-thread check, guideline compliance, finding verification). Uses aux-provider/JBOT_AUX_PROVIDER when set, otherwise the main provider. Uses the main model when unset.'
    required: false
    default: ''
  aux-provider:
    description: 'Optional provider for aux-model. Defaults to provider/JBOT_REVIEW_PROVIDER when unset.'
    required: false
    default: ''
  review-passes:
    description: 'Total review passes (1-3). Passes beyond the first add focused recall lenses (interactions, then integrity) in parallel on the aux model; findings are merged and deduped. Each extra pass costs roughly one extra model session — cheap on paid tiers, but adds queue time on throttled free tiers. Default 1; raise to 2-3 for maximum recall.'
    required: false
    default: '1'
  verify-findings:
    description: 'Adversarially verify blocking findings in a dedicated session before posting: refuted findings are dropped, uncertain ones demoted to advisory.'
    required: false
    default: 'true'
  time-budget-minutes:
    description: 'Wall-clock target in minutes (0 = no budget). Derives per-session timeouts; an auxiliary session over its share fails open (degrades only itself), while a main review shard that still fails after its retry aborts the run rather than posting partial coverage.'
    required: false
    default: '30'
  review-shards:
    description: 'Parallel shards for the main review. 1 = no sharding, one full-diff session (default). 0 = auto from diff size, capped at 4. N = pin N shards. Sharding only speeds up review on providers that serve concurrent sessions; on free/throttled tiers the shards serialize on one API key, so 1 is the better default. Either way the review covers the complete diff. Raise it (and pair with max-concurrent-sessions) only on paid tiers with real concurrency, or for very large PRs where smaller per-shard context helps depth.'
    required: false
    default: '1'
  dynamic-fanout:
    description: 'Scale recall-supplement fan-out (extra lenses + the guideline pass) to diff risk/size; false forces the full requested fan-out on every PR.'
    required: false
    default: 'true'
  model-options:
    description: 'JSON object of provider options for the main model. Defaults to {"reasoningEffort":"medium"} — a balance of depth and latency; raise to high for paid heavy tiers, or pass {} to send no options (e.g. for providers that reject unknown options). Aux-model sessions are unaffected.'
    required: false
    default: '{"reasoningEffort":"medium"}'
  prompt-cache:
    description: 'Enable opencode prompt caching (provider setCacheKey). Parallel shards and re-reviews share an identical prompt prefix, so caching cuts input-token cost on models that honor it; models marked unsupported omit the cache key. Per-session cache hits are logged.'
    required: false
    default: 'true'
  skip-doc-only:
    description: 'Skip the full LLM review when a PR changes only documentation, prose, or diagram assets (.md, .mdx, .markdown, .rst, .adoc, .txt, .pdf, .svg, .drawio, .dio, .excalidraw, .mmd, .puml, .plantuml). The reaction is left unchanged (a docs push does not change the verdict, so a prior clean reaction stays and an open-findings PR stays reaction-less); a single code/config file forces a full review. Deterministic, no model call.'
    required: false
    default: 'true'
  max-concurrent-sessions:
    description: 'Max model sessions in flight at once (default 3; 0 = unlimited). Throttled provider tiers serialize concurrent requests on one key upstream; capping on our side keeps session deadlines measuring model time, not queue time. Set 2 on tight free tiers, or 0 for unlimited on paid concurrent tiers.'
    required: false
    default: '3'
  review-telemetry:
    description: 'Emit per-finding disposition + per-session telemetry to .jbot-review/telemetry.jsonl (default true). Near-zero overhead: in-memory tagging plus one post-review write. Set false to disable.'
    required: false
    default: 'true'
  evidence-quotes:
    description: 'Ask each finding to carry a verbatim quote of the changed line it flags (default true). Grounds finding verification and lets a would-be-orphaned finding be re-anchored. Set false to keep the pre-F12 prompt.'
    required: false
    default: 'true'
  fail-on-error:
    description: 'Fail the workflow when the review cannot complete.'
    required: false
    default: 'true'

runs:
  using: 'docker'
  image: 'docker://ghcr.io/pgup-ai/jbot-review:latest'
  entrypoint: 'node'
  args: ['/app/dist/workflow/index.js']
  env:
    INPUT_PROVIDER: ${{ inputs.provider }}
    INPUT_MODEL: ${{ inputs.model }}
    INPUT_OPENCODE-API-KEY: ${{ inputs.opencode-api-key }}
    INPUT_DEEPSEEK-API-KEY: ${{ inputs.deepseek-api-key }}
    INPUT_OPENAI-API-KEY: ${{ inputs.openai-api-key }}
    INPUT_ANTHROPIC-API-KEY: ${{ inputs.anthropic-api-key }}
    INPUT_GEMINI-API-KEY: ${{ inputs.gemini-api-key }}
    INPUT_OPENROUTER-API-KEY: ${{ inputs.openrouter-api-key }}
    INPUT_NVIDIA-API-KEY: ${{ inputs.nvidia-api-key }}
    INPUT_ZAI-API-KEY: ${{ inputs.zai-api-key }}
    INPUT_XAI-API-KEY: ${{ inputs.xai-api-key }}
    INPUT_FIREWORKS-API-KEY: ${{ inputs.fireworks-api-key }}
    INPUT_MIMO-API-KEY: ${{ inputs.mimo-api-key }}
    INPUT_DEVIN-WINDSURF-API-KEY: ${{ inputs.devin-windsurf-api-key }}
    INPUT_COMMANDCODE-ACCESS-KEY: ${{ inputs.commandcode-access-key }}
    INPUT_CURSOR-API-KEY: ${{ inputs.cursor-api-key }}
    INPUT_CODEX-AUTH: ${{ inputs.codex-auth }}
    INPUT_CLINE-AUTH: ${{ inputs.cline-auth }}
    INPUT_KILO-AUTH: ${{ inputs.kilo-auth }}
    INPUT_ENABLE-CONTEXT7: ${{ inputs.enable-context7 }}
    INPUT_CONTEXT7-API-KEY: ${{ inputs.context7-api-key }}
    INPUT_GITHUB-TOKEN: ${{ inputs.github-token }}
    INPUT_THREAD-RESOLUTION-TOKEN: ${{ inputs.thread-resolution-token }}
    INPUT_PR-NUMBER: ${{ inputs.pr-number }}
    INPUT_DRY-RUN: ${{ inputs.dry-run }}
    INPUT_MAX-FINDINGS: ${{ inputs.max-findings }}
    INPUT_MIN-SEVERITY: ${{ inputs.min-severity }}
    INPUT_INCLUDE-PRIOR-COMMENTS: ${{ inputs.include-prior-comments }}
    INPUT_ENABLE-GUIDELINE-PASS: ${{ inputs.enable-guideline-pass }}
    INPUT_AUX-MODEL: ${{ inputs.aux-model }}
    INPUT_AUX-PROVIDER: ${{ inputs.aux-provider }}
    INPUT_REVIEW-PASSES: ${{ inputs.review-passes }}
    INPUT_VERIFY-FINDINGS: ${{ inputs.verify-findings }}
    INPUT_TIME-BUDGET-MINUTES: ${{ inputs.time-budget-minutes }}
    INPUT_REVIEW-SHARDS: ${{ inputs.review-shards }}
    INPUT_DYNAMIC-FANOUT: ${{ inputs.dynamic-fanout }}
    INPUT_MODEL-OPTIONS: ${{ inputs.model-options }}
    INPUT_PROMPT-CACHE: ${{ inputs.prompt-cache }}
    INPUT_SKIP-DOC-ONLY: ${{ inputs.skip-doc-only }}
    INPUT_MAX-CONCURRENT-SESSIONS: ${{ inputs.max-concurrent-sessions }}
    INPUT_REVIEW-TELEMETRY: ${{ inputs.review-telemetry }}
    INPUT_EVIDENCE-QUOTES: ${{ inputs.evidence-quotes }}
    INPUT_FAIL-ON-ERROR: ${{ inputs.fail-on-error }}
