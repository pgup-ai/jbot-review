name: J-Bot Code Review
on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment: # one-off reviews: "/jbot [--provider=<id>] [--model=<id>]" on a PR
    types: [created]
  workflow_dispatch:
    inputs:
      pr-number:
        description: Pull request number to review
        required: true
      provider:
        description: 'LLM provider. Uses JBOT_REVIEW_PROVIDER or opencode if unset.'
        required: false
        default: ''
      model:
        description: 'Model as provider/model. Uses provider default if unset.'
        required: false
        default: ''
      dry-run:
        description: Log review output without posting to GitHub
        required: false
        default: 'false'
      max-findings:
        description: Maximum number of findings to post or log. Use 0 for no limit.
        required: false
        default: '0'
      min-severity:
        description: 'Minimum severity to include: P0, P1, P2, P3, or nit'
        required: false
        default: nit
      include-prior-comments:
        description: Include prior PR review comments in context
        required: false
        default: 'true'
      enable-context7:
        description: 'Use Context7 MCP for external API/SDK/framework/workflow changes: auto, true, or false'
        required: false
        default: auto
      fail-on-error:
        description: Fail the workflow when review cannot complete
        required: false
        default: 'true'

permissions:
  contents: read
  packages: read
  pull-requests: write
  issues: write # PR reactions (jbot's review-done 🚀, /jbot's 👀 ack) use the issues API
  checks: read

jobs:
  # /jbot one-off reviews. Separate job so a rejected command never queues into
  # the review concurrency group — queueing there would evict a live review.
  command:
    # Gate: PR comments only, /jbot-prefixed, commenter with repo rights —
    # every accepted command spends provider credits.
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/jbot') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    # This job handles untrusted comment text — drop every other scope. The 👀
    # ack needs pull-requests (not issues) write: reactions on PR comments are
    # gated by the pull-requests permission (verified; issues-only 403s).
    permissions:
      pull-requests: write # 👀 ack reaction + gh pr view (fork-head guard)
    runs-on: ubuntu-latest
    outputs:
      # proceed comes from its own step AFTER the guard: outputs of earlier
      # steps survive a failed job, and review's always() would honor them.
      proceed: ${{ steps.ok.outputs.proceed }}
      provider: ${{ steps.cmd.outputs.provider }}
      model: ${{ steps.cmd.outputs.model }}
    steps:
      - name: Parse /jbot command
        id: cmd
        env:
          # Untrusted input — never interpolate into the script via ${{ }}.
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -f # no globbing: prose tokens like * must stay literal
          first_line="$(printf '%s\n' "$COMMENT_BODY" | head -n1 | tr -d '\r')"
          provider='' model='' seen_cmd=false bad=false
          for tok in $first_line; do
            if [ "$seen_cmd" = false ]; then
              [ "$tok" = '/jbot' ] || bad=true
              seen_cmd=true
              continue
            fi
            case "$tok" in
              --provider=* | --model=*)
                key="${tok%%=*}" val="${tok#*=}"
                case "$val" in
                  '') echo "::warning::/jbot: $key has an empty value; using the repo default" ;;
                  *[!A-Za-z0-9._:/-]*) echo "::warning::/jbot: ignoring $key value with unsupported characters; using the repo default" ;;
                  *) if [ "$key" = '--provider' ]; then provider="$val"; else model="$val"; fi ;;
                esac
                ;;
              --*)
                echo "::error::/jbot: unknown flag ${tok%%=*}; supported: --provider=<id> --model=<id>"
                bad=true
                ;;
              # Prose mentions ("/jbot is failing...") must not burn a review run.
              *) bad=true ;;
            esac
          done
          if [ "$bad" = true ] || [ "$seen_cmd" = false ]; then
            echo "::error::Not a /jbot command; expected '/jbot [--provider=<id>] [--model=<id>]' as the first line."
            exit 1
          fi
          if printf '%s\n' "$COMMENT_BODY" | tail -n +2 | grep -qE -- '--(provider|model)='; then
            echo "::warning::/jbot: flags after the first line are ignored"
          fi
          {
            echo "provider=$provider"
            echo "model=$model"
          } >> "$GITHUB_OUTPUT"
          echo "/jbot overrides: provider='${provider:-<unset>}' model='${model:-<unset>}'"
      - name: Require same-repo PR head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cross="$(gh pr view '${{ github.event.issue.number }}' --repo '${{ github.repository }}' --json isCrossRepository --jq .isCrossRepository)"
          if [ "$cross" != "false" ]; then
            echo "::error::/jbot is disabled for fork-head PRs: this workflow builds the reviewer from the checked-out head."
            exit 1
          fi
      - name: Confirm command
        id: ok
        run: echo "proceed=true" >> "$GITHUB_OUTPUT"
      - name: Ack /jbot command # last: 👀 means the command was accepted
        continue-on-error: true # ack is UX; never blocks the review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" -f content=eyes --silent

  review:
    needs: [command]
    # always(): command is skipped on pull_request/dispatch events and must not
    # auto-skip this job; the conditions below re-gate every event.
    if: >-
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
        (github.event_name == 'issue_comment' && needs.command.outputs.proceed == 'true')
      )
    # One review per PR (auto + one-off share the group; markers and threads
    # race otherwise — a PR's issue.number is its PR number). Job-level, and
    # only on this job: rejected commands and gate-skipped comment runs must
    # never evict a live review.
    concurrency:
      group: jbot-review-${{ github.event.pull_request.number || inputs['pr-number'] || github.event.issue.number || github.run_id }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # issue_comment and workflow_dispatch run on the default branch, so
          # explicitly check out the PR head they target.
          ref: ${{ github.event.pull_request.head.sha || format('refs/pull/{0}/head', inputs['pr-number'] || github.event.issue.number) }}
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run build
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          load: true # put :latest in the local daemon for `uses: ./`
          tags: ghcr.io/pgup-ai/jbot-review:latest
          # Reuse the code-independent layers main published to :buildcache;
          # only COPY dist/ rebuilds. No cache-to — PRs read, don't write.
          cache-from: type=registry,ref=ghcr.io/pgup-ai/jbot-review:buildcache
      - uses: ./
        with:
          # Precedence: /jbot comment flag > dispatch input > repo variable > default.
          provider: ${{ needs.command.outputs.provider || inputs.provider || vars.JBOT_REVIEW_PROVIDER || 'opencode' }}
          model: ${{ needs.command.outputs.model || inputs.model || vars.JBOT_REVIEW_MODEL || '' }}
          pr-number: ${{ github.event.pull_request.number || inputs['pr-number'] || github.event.issue.number }}
          dry-run: ${{ inputs['dry-run'] || 'false' }}
          max-findings: ${{ inputs['max-findings'] || '0' }}
          min-severity: ${{ inputs['min-severity'] || 'nit' }}
          include-prior-comments: ${{ inputs['include-prior-comments'] || 'true' }}
          aux-provider: ${{ vars.JBOT_AUX_PROVIDER || '' }}
          aux-model: ${{ vars.JBOT_REVIEW_AUX_MODEL || '' }}
          review-passes: ${{ vars.JBOT_REVIEW_PASSES || '1' }}
          verify-findings: ${{ vars.JBOT_VERIFY_FINDINGS || 'true' }}
          time-budget-minutes: ${{ vars.JBOT_TIME_BUDGET_MINUTES || '30' }}
          review-shards: ${{ vars.JBOT_REVIEW_SHARDS || '1' }}
          model-options: ${{ vars.JBOT_MODEL_OPTIONS || '' }}
          prompt-cache: ${{ vars.JBOT_PROMPT_CACHE || 'true' }}
          skip-doc-only: ${{ vars.JBOT_SKIP_DOC_ONLY || 'true' }}
          max-concurrent-sessions: ${{ vars.JBOT_MAX_CONCURRENT_SESSIONS || '0' }}
          review-telemetry: ${{ vars.JBOT_REVIEW_TELEMETRY || 'true' }}
          evidence-quotes: ${{ vars.JBOT_EVIDENCE_QUOTES || 'true' }}
          enable-context7: ${{ inputs['enable-context7'] || 'auto' }}
          fail-on-error: ${{ inputs['fail-on-error'] || 'true' }}
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}
          deepseek-api-key: ${{ secrets.DEEPSEEK_API_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          nvidia-api-key: ${{ secrets.NVIDIA_API_KEY }}
          zai-api-key: ${{ secrets.ZAI_API_KEY }}
          xai-api-key: ${{ secrets.XAI_API_KEY }}
          fireworks-api-key: ${{ secrets.FIREWORKS_API_KEY }}
          mimo-api-key: ${{ secrets.MIMO_API_KEY }}
          devin-windsurf-api-key: ${{ secrets.DEVIN_WINDSURF_API_KEY }}
          commandcode-access-key: ${{ secrets.COMMANDCODE_ACCESS_KEY }}
          cursor-api-key: ${{ secrets.CURSOR_API_KEY }}
          codex-auth: ${{ secrets.CODEX_AUTH_JSON }}
          cline-auth: ${{ secrets.CLINE_AUTH_JSON }}
          grok-auth: ${{ secrets.GROK_AUTH_JSON }}
          kilo-auth: ${{ secrets.KILO_AUTH_CONTENT }}
          context7-api-key: ${{ secrets.CONTEXT7_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          thread-resolution-token: ${{ secrets.JBOT_REVIEW_THREAD_RESOLUTION_TOKEN }}
      - name: Upload review telemetry
        if: always()
        # Telemetry is fail-open end to end: an upload error must not fail the review job.
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: jbot-review-telemetry
          path: .jbot-review/telemetry.jsonl
          if-no-files-found: ignore
          retention-days: 14
